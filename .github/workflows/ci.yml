name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Run TypeScript check
        run: npm run typecheck
      - name: Run ESLint
        run: npm run lint
      - name: Run unit tests
        run: npm test
